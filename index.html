<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expired Goods Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
    function toggleDarkMode() { document.documentElement.classList.toggle('dark'); }
  </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors min-h-screen">

  <!-- Dark mode toggle -->
  <div class="fixed top-4 right-4 z-40">
    <button onclick="toggleDarkMode()" class="px-3 py-1 bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 rounded-full text-sm">🌓</button>
  </div>

  <!-- Tab Navigation -->
  <div class="max-w-lg mx-auto pt-6 pb-4 px-4">
    <div class="flex justify-center space-x-2 sm:space-x-4 mb-6 flex-wrap">
      <button onclick="showTab('scan')" id="tab-scan" class="px-4 py-2 bg-blue-600 text-white rounded-md font-semibold text-sm">Scan Input</button>
      <button onclick="showTab('dashboard')" id="tab-dashboard" class="px-4 py-2 bg-gray-300 dark:bg-gray-700 text-gray-800 dark:text-gray-200 rounded-md text-sm">Dashboard</button>
      <button onclick="requestEditAccess()" id="tab-edit" class="px-4 py-2 bg-gray-300 dark:bg-gray-700 text-gray-800 dark:text-gray-200 rounded-md text-sm">Edit Data</button>
    </div>
  </div>

  <!-- SCAN PAGE -->
  <div id="scan-page" class="max-w-md mx-auto px-4">
    <h1 class="text-2xl font-bold mb-6 text-gray-800 dark:text-white">Input Barang Expired</h1>
    <form id="scan-form" class="space-y-4">
      <div class="flex gap-2">
        <input type="text" id="barcode" inputmode="numeric" placeholder="Scan atau ketik barcode" class="flex-1 px-3 py-2 border rounded-md dark:bg-gray-800 dark:border-gray-700 dark:text-white" required autofocus>
        <button type="button" onclick="startScanner()" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition">📷 Scan</button>
      </div>
      <div><label class="block text-sm font-medium text-gray-700 dark:text-gray-300">SKU</label><input type="text" id="sku" readonly placeholder="Otomatis terisi" class="mt-1 w-full px-3 py-2 border rounded-md bg-gray-100 dark:bg-gray-700 dark:border-gray-600 dark:text-gray-300 cursor-not-allowed"></div>
      <div><label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Item Description</label><input type="text" id="itemDescription" readonly placeholder="Otomatis terisi" class="mt-1 w-full px-3 py-2 border rounded-md bg-gray-100 dark:bg-gray-700 dark:border-gray-600 dark:text-gray-300 cursor-not-allowed"></div>
      <div><label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Qty</label><input type="number" id="qty" placeholder="Jumlah" min="1" step="1" class="mt-1 w-full px-3 py-2 border rounded-md dark:bg-gray-800 dark:border-gray-700 dark:text-white" required></div>
      <div><label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Tanggal Expired</label><input type="date" id="expiredDate" class="mt-1 w-full px-3 py-2 border rounded-md dark:bg-gray-800 dark:border-gray-700 dark:text-white" required></div>
      <div><label class="block text-sm font-medium text-gray-700 dark:text-gray-300">PIC</label><input type="text" id="pic" placeholder="Nama petugas" class="mt-1 w-full px-3 py-2 border rounded-md dark:bg-gray-800 dark:border-gray-700 dark:text-white" required></div>
      <div><label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Lokasi</label><input type="text" id="location" placeholder="Gudang / Cabang" list="locations-list" class="mt-1 w-full px-3 py-2 border rounded-md dark:bg-gray-800 dark:border-gray-700 dark:text-white" required>
        <datalist id="locations-list"><option value="Gudang A"><option value="Gudang B"><option value="Cabang C"></datalist>
      </div>
      <button type="submit" id="submit-btn" class="w-full py-3 bg-green-600 text-white font-semibold rounded-md hover:bg-green-700 transition">Simpan</button>
    </form>
    <div id="feedback" class="mt-4"></div>
  </div>

  <!-- DASHBOARD PAGE -->
  <div id="dashboard-page" class="max-w-6xl mx-auto px-4 hidden">
    <h1 class="text-2xl font-bold mb-6 text-gray-800 dark:text-white">Riwayat Barang Expired</h1>
    <div class="grid grid-cols-2 sm:grid-cols-5 gap-3 mb-6">
      <input type="text" id="filterBarcode" placeholder="Barcode" class="px-3 py-2 border rounded-md dark:bg-gray-800 dark:border-gray-700 dark:text-white" oninput="applyFilters()">
      <input type="text" id="filterPic" placeholder="PIC" class="px-3 py-2 border rounded-md dark:bg-gray-800 dark:border-gray-700 dark:text-white" oninput="applyFilters()">
      <input type="text" id="filterLocation" placeholder="Lokasi" class="px-3 py-2 border rounded-md dark:bg-gray-800 dark:border-gray-700 dark:text-white" oninput="applyFilters()">
      <input type="date" id="filterStartDate" class="px-3 py-2 border rounded-md dark:bg-gray-800 dark:border-gray-700 dark:text-white" oninput="applyFilters()">
      <input type="date" id="filterEndDate" class="px-3 py-2 border rounded-md dark:bg-gray-800 dark:border-gray-700 dark:text-white" oninput="applyFilters()">
    </div>
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
        <thead class="bg-gray-50 dark:bg-gray-700">
          <tr><th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase">Barcode</th><th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase">SKU</th><th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase">Item Desc</th><th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase">Qty</th><th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase">Expired Date</th><th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase">PIC</th><th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase">Lokasi</th></tr>
        </thead>
        <tbody id="table-body" class="divide-y divide-gray-200 dark:divide-gray-700"></tbody>
      </table>
    </div>
  </div>

  <!-- EDIT PAGE -->
  <div id="edit-page" class="max-w-6xl mx-auto px-4 hidden">
    <h1 class="text-2xl font-bold mb-6 text-gray-800 dark:text-white">Edit Data Expired</h1>
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
        <thead class="bg-gray-50 dark:bg-gray-700">
          <tr><th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase">Barcode</th><th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase">SKU</th><th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase">Item Desc</th><th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase">Qty</th><th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase">Expired Date</th><th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase">PIC</th><th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase">Lokasi</th><th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase">Aksi</th></tr>
        </thead>
        <tbody id="edit-table-body" class="divide-y divide-gray-200 dark:divide-gray-700"></tbody>
      </table>
    </div>
    <div id="edit-feedback" class="mt-4"></div>
  </div>

  <!-- Modal Edit -->
  <div id="edit-modal" class="fixed inset-0 z-50 bg-black bg-opacity-60 hidden items-center justify-center p-4">
    <div class="bg-white dark:bg-gray-800 rounded-lg p-6 w-full max-w-md">
      <h2 class="text-xl font-bold mb-4 text-gray-800 dark:text-white">Edit Data</h2>
      <form id="edit-form" class="space-y-3">
        <input type="hidden" id="edit-id">
        <div><label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Barcode</label><input type="text" id="edit-barcode" class="mt-1 w-full px-3 py-2 border rounded-md dark:bg-gray-700 dark:border-gray-600 dark:text-white" required></div>
        <div><label class="block text-sm font-medium text-gray-700 dark:text-gray-300">SKU</label><input type="text" id="edit-sku" class="mt-1 w-full px-3 py-2 border rounded-md dark:bg-gray-700 dark:border-gray-600 dark:text-white" required></div>
        <div><label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Item Description</label><input type="text" id="edit-itemDescription" class="mt-1 w-full px-3 py-2 border rounded-md dark:bg-gray-700 dark:border-gray-600 dark:text-white" required></div>
        <div><label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Qty</label><input type="number" id="edit-qty" class="mt-1 w-full px-3 py-2 border rounded-md dark:bg-gray-700 dark:border-gray-600 dark:text-white" required></div>
        <div><label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Expired Date (dd-mm-yyyy)</label><input type="text" id="edit-expiredDate" placeholder="dd-mm-yyyy" class="mt-1 w-full px-3 py-2 border rounded-md dark:bg-gray-700 dark:border-gray-600 dark:text-white" required></div>
        <div><label class="block text-sm font-medium text-gray-700 dark:text-gray-300">PIC</label><input type="text" id="edit-pic" class="mt-1 w-full px-3 py-2 border rounded-md dark:bg-gray-700 dark:border-gray-600 dark:text-white" required></div>
        <div><label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Lokasi</label><input type="text" id="edit-location" class="mt-1 w-full px-3 py-2 border rounded-md dark:bg-gray-700 dark:border-gray-600 dark:text-white" required></div>
        <div class="flex gap-2 pt-3">
          <button type="button" onclick="closeEditModal()" class="flex-1 py-2 bg-gray-300 dark:bg-gray-600 text-gray-800 dark:text-white rounded-md">Batal</button>
          <button type="submit" class="flex-1 py-2 bg-blue-600 text-white rounded-md">Simpan</button>
        </div>
      </form>
    </div>
  </div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwm9RP6EEmJkx3m9lj7hY6iQb-f_TlKNNmN_DdpEbrZDsjPROrEV9AD9UXiAxeweQiM/exec';
  const EDIT_PASSWORD = 'admin123';

  let allRecords = [];
  let scanner = null;

  // ========== TABS ==========
  function showTab(tab) {
    document.getElementById('scan-page').classList.add('hidden');
    document.getElementById('dashboard-page').classList.add('hidden');
    document.getElementById('edit-page').classList.add('hidden');
    ['tab-scan','tab-dashboard','tab-edit'].forEach(id => {
      const btn = document.getElementById(id);
      btn.classList.remove('bg-blue-600','text-white');
      btn.classList.add('bg-gray-300','dark:bg-gray-700','text-gray-800','dark:text-gray-200');
    });

    if (tab === 'scan') {
      document.getElementById('scan-page').classList.remove('hidden');
      document.getElementById('tab-scan').classList.add('bg-blue-600','text-white');
      document.getElementById('tab-scan').classList.remove('bg-gray-300','dark:bg-gray-700','text-gray-800','dark:text-gray-200');
      document.getElementById('barcode').focus();
    } else if (tab === 'dashboard') {
      document.getElementById('dashboard-page').classList.remove('hidden');
      document.getElementById('tab-dashboard').classList.add('bg-blue-600','text-white');
      document.getElementById('tab-dashboard').classList.remove('bg-gray-300','dark:bg-gray-700','text-gray-800','dark:text-gray-200');
      loadDashboardData();
    } else if (tab === 'edit') {
      document.getElementById('edit-page').classList.remove('hidden');
      document.getElementById('tab-edit').classList.add('bg-blue-600','text-white');
      document.getElementById('tab-edit').classList.remove('bg-gray-300','dark:bg-gray-700','text-gray-800','dark:text-gray-200');
      loadEditData();
    }
  }

  function requestEditAccess() {
    const pw = prompt('Masukkan password untuk akses Edit Data:');
    if (pw === EDIT_PASSWORD) {
      showTab('edit');
    } else if (pw !== null) {
      alert('Password salah!');
    }
  }

  // ========== SCANNER ==========
  function startScanner() {
    const overlay = document.createElement('div');
    overlay.id = 'scanner-overlay';
    overlay.className = 'fixed inset-0 z-50 bg-black bg-opacity-80 flex items-center justify-center p-4';
    overlay.innerHTML = `
      <div class="bg-white dark:bg-gray-800 rounded-lg p-4 w-full max-w-md">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-lg font-semibold dark:text-white">Scan Barcode</h2>
          <button id="close-scanner" class="text-gray-500 hover:text-gray-700 dark:text-gray-300 dark:hover:text-white text-xl">✕</button>
        </div>
        <div id="scanner-container" class="w-full rounded overflow-hidden"></div>
      </div>`;
    document.body.appendChild(overlay);
    document.getElementById('close-scanner').addEventListener('click', stopScanner);

    scanner = new Html5Qrcode("scanner-container");
    const config = { fps: 10, qrbox: { width: 250, height: 250 } };
    scanner.start({ facingMode: "environment" }, config,
      (decodedText) => {
        document.getElementById('barcode').value = decodedText;
        fetchProduct(decodedText);
        stopScanner();
      },
      () => {}
    ).catch(err => {
      showFeedback('Kamera tidak tersedia: ' + err.message, 'error');
      stopScanner();
    });
  }

  function stopScanner() {
    if (scanner) {
      scanner.stop().catch(e => console.error(e));
      scanner = null;
    }
    const overlay = document.getElementById('scanner-overlay');
    if (overlay) overlay.remove();
    document.getElementById('barcode').focus();
  }

  // ========== PRODUCT LOOKUP ==========
  async function fetchProduct(barcode) {
    if (!barcode) return;
    try {
      const res = await fetch(`${SCRIPT_URL}?action=getProduct&barcode=${encodeURIComponent(barcode)}`);
      const data = await res.json();
      if (data.error) {
        document.getElementById('sku').value = '';
        document.getElementById('itemDescription').value = '';
        showFeedback('Produk tidak ditemukan di MASTER', 'error');
      } else {
        document.getElementById('sku').value = data.sku || '';
        document.getElementById('itemDescription').value = data.itemDescription || '';
      }
    } catch (err) {
      showFeedback('Gagal menghubungi server', 'error');
    }
  }

  document.getElementById('barcode').addEventListener('input', function(e) {
    const code = e.target.value.trim();
    if (code.length >= 8) fetchProduct(code);
    else {
      document.getElementById('sku').value = '';
      document.getElementById('itemDescription').value = '';
    }
  });

  // ========== SUBMIT FORM (ADD) ==========
  document.getElementById('scan-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const barcode = document.getElementById('barcode').value.trim();
    const sku = document.getElementById('sku').value.trim();
    const itemDescription = document.getElementById('itemDescription').value.trim();
    const qty = parseInt(document.getElementById('qty').value);
    const expiredDate = document.getElementById('expiredDate').value;
    const pic = document.getElementById('pic').value.trim();
    const location = document.getElementById('location').value.trim();

    if (!barcode || !sku || !itemDescription || !qty || !expiredDate || !pic || !location) {
      showFeedback('Semua field wajib diisi dan barcode harus valid', 'error'); return;
    }
    const btn = document.getElementById('submit-btn');
    btn.disabled = true; btn.textContent = 'Menyimpan...';
    try {
      const res = await fetch(`${SCRIPT_URL}?action=addRecord`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ barcode, sku, itemDescription, qty, expiredDate, pic, location })
      });
      const result = await res.json();
      if (result.success) {
        showFeedback('Data tersimpan!', 'success');
        ['barcode','sku','itemDescription','qty','expiredDate','pic','location'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('barcode').focus();
      } else {
        showFeedback('Gagal menyimpan', 'error');
      }
    } catch (err) {
      showFeedback('Gagal menghubungi server', 'error');
    } finally { btn.disabled = false; btn.textContent = 'Simpan'; }
  });

  // ========== DASHBOARD ==========
  async function loadDashboardData() {
    try {
      const res = await fetch(`${SCRIPT_URL}?action=getRecords`);
      const data = await res.json();
      allRecords = Array.isArray(data) ? data : [];
      applyFilters();
    } catch (err) { allRecords = []; applyFilters(); }
  }

  function applyFilters() {
    const bf = document.getElementById('filterBarcode')?.value.toLowerCase() || '';
    const pf = document.getElementById('filterPic')?.value.toLowerCase() || '';
    const lf = document.getElementById('filterLocation')?.value.toLowerCase() || '';
    const sd = document.getElementById('filterStartDate')?.value || '';
    const ed = document.getElementById('filterEndDate')?.value || '';
    let filtered = allRecords;
    if (bf) filtered = filtered.filter(r => (r.Barcode||'').toLowerCase().includes(bf));
    if (pf) filtered = filtered.filter(r => (r.PIC||'').toLowerCase().includes(pf));
    if (lf) filtered = filtered.filter(r => (r.Lokasi||'').toLowerCase().includes(lf));
    if (sd) filtered = filtered.filter(r => r['Expired Date'] >= sd);
    if (ed) filtered = filtered.filter(r => r['Expired Date'] <= ed);
    const tbody = document.getElementById('table-body');
    if (filtered.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" class="px-4 py-6 text-center text-gray-500 dark:text-gray-400">Tidak ada data.</td></tr>';
    } else {
      tbody.innerHTML = filtered.map(r => `
        <tr class="hover:bg-gray-50 dark:hover:bg-gray-750">
          <td class="px-4 py-3 text-sm font-mono">${r.Barcode||''}</td>
          <td class="px-4 py-3 text-sm">${r.SKU||''}</td>
          <td class="px-4 py-3 text-sm">${r['Item Description']||''}</td>
          <td class="px-4 py-3 text-sm">${r.Qty||''}</td>
          <td class="px-4 py-3 text-sm">${r['Expired Date']||''}</td>
          <td class="px-4 py-3 text-sm">${r.PIC||''}</td>
          <td class="px-4 py-3 text-sm">${r.Lokasi||''}</td>
        </tr>`).join('');
    }
  }

  // ========== EDIT DATA ==========
  async function loadEditData() {
    try {
      const res = await fetch(`${SCRIPT_URL}?action=getRecords`);
      const data = await res.json();
      allRecords = Array.isArray(data) ? data : [];
      renderEditTable(allRecords);
    } catch (err) {
      document.getElementById('edit-table-body').innerHTML = '<tr><td colspan="8" class="px-4 py-6 text-center text-red-500">Gagal memuat data</td></tr>';
    }
  }

  function renderEditTable(records) {
    const tbody = document.getElementById('edit-table-body');
    if (records.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8" class="px-4 py-6 text-center text-gray-500">Tidak ada data.</td></tr>';
      return;
    }
    tbody.innerHTML = records.map(r => {
      const safeRecord = {
        ID: r.ID,
        Barcode: r.Barcode || '',
        SKU: r.SKU || '',
        itemDescription: r['Item Description'] || '',
        Qty: r.Qty || '',
        expiredDate: r['Expired Date'] || '',
        PIC: r.PIC || '',
        Lokasi: r.Lokasi || '',
      };
      return `
      <tr class="hover:bg-gray-50 dark:hover:bg-gray-750">
        <td class="px-4 py-3 text-sm font-mono">${safeRecord.Barcode}</td>
        <td class="px-4 py-3 text-sm">${safeRecord.SKU}</td>
        <td class="px-4 py-3 text-sm">${safeRecord.itemDescription}</td>
        <td class="px-4 py-3 text-sm">${safeRecord.Qty}</td>
        <td class="px-4 py-3 text-sm">${safeRecord.expiredDate}</td>
        <td class="px-4 py-3 text-sm">${safeRecord.PIC}</td>
        <td class="px-4 py-3 text-sm">${safeRecord.Lokasi}</td>
        <td class="px-4 py-3 text-sm space-x-1">
          <button onclick='openEditModal(${JSON.stringify(safeRecord).replace(/'/g, "&#39;")})' class="text-blue-600 hover:underline text-xs">✏️ Edit</button>
          <button onclick='deleteRecord("${safeRecord.ID}")' class="text-red-600 hover:underline text-xs">🗑️ Hapus</button>
        </td>
      </tr>`;
    }).join('');
  }

  window.openEditModal = function(record) {
    console.log('openEditModal dipanggil', record);
    document.getElementById('edit-id').value = record.ID || '';
    document.getElementById('edit-barcode').value = record.Barcode || '';
    document.getElementById('edit-sku').value = record.SKU || '';
    document.getElementById('edit-itemDescription').value = record.itemDescription || '';
    document.getElementById('edit-qty').value = record.Qty || '';
    document.getElementById('edit-expiredDate').value = record.expiredDate || '';
    document.getElementById('edit-pic').value = record.PIC || '';
    document.getElementById('edit-location').value = record.Lokasi || '';
    const modal = document.getElementById('edit-modal');
    modal.classList.remove('hidden');
    modal.classList.add('flex');
  };

  window.closeEditModal = function() {
    const modal = document.getElementById('edit-modal');
    modal.classList.add('hidden');
    modal.classList.remove('flex');
  };

  // Event listener form edit
  document.getElementById('edit-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    console.log('Form edit disubmit');
    const id = document.getElementById('edit-id').value;
    const barcode = document.getElementById('edit-barcode').value.trim();
    const sku = document.getElementById('edit-sku').value.trim();
    const itemDescription = document.getElementById('edit-itemDescription').value.trim();
    const qty = parseInt(document.getElementById('edit-qty').value);
    const expiredDate = document.getElementById('edit-expiredDate').value.trim();
    const pic = document.getElementById('edit-pic').value.trim();
    const location = document.getElementById('edit-location').value.trim();

    if (!id || !barcode || !sku || !itemDescription || !qty || !expiredDate || !pic || !location) {
      alert('Semua field harus diisi');
      return;
    }
    const payload = { id, password: EDIT_PASSWORD, barcode, sku, itemDescription, qty, expiredDate, pic, location };
    console.log('Payload update:', payload);
    try {
      const res = await fetch(`${SCRIPT_URL}?action=updateRecord`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const result = await res.json();
      console.log('Hasil update:', result);
      if (result.success) {
        closeEditModal();
        loadEditData();
        showEditFeedback('Data berhasil diupdate', 'success');
      } else {
        alert('Gagal update: ' + (result.error || 'Unknown error'));
      }
    } catch (err) {
      console.error('Error fetch update:', err);
      alert('Gagal menghubungi server');
    }
  });

  window.deleteRecord = async function(id) {
    if (!confirm('Yakin hapus data ini?')) return;
    console.log('Menghapus ID:', id);
    try {
      const res = await fetch(`${SCRIPT_URL}?action=deleteRecord`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, password: EDIT_PASSWORD })
      });
      const result = await res.json();
      if (result.success) {
        loadEditData();
        showEditFeedback('Data berhasil dihapus', 'success');
      } else {
        alert('Gagal hapus: ' + (result.error || 'Unknown error'));
      }
    } catch (err) {
      alert('Gagal menghubungi server');
    }
  };

  function showEditFeedback(msg, type) {
    const fb = document.getElementById('edit-feedback');
    fb.innerHTML = `<div class="p-3 rounded-md ${type==='success'?'bg-green-100 text-green-800':'bg-red-100 text-red-800'}">${msg}</div>`;
    setTimeout(() => fb.innerHTML = '', 3000);
  }

  function showFeedback(msg, type) {
    const fb = document.getElementById('feedback');
    fb.innerHTML = `<div class="p-3 rounded-md ${type==='success'?'bg-green-100 text-green-800':'bg-red-100 text-red-800'}">${msg}</div>`;
    setTimeout(() => fb.innerHTML = '', 3000);
  }

  // Mulai
  showTab('scan');
</script>
</body>
</html>
